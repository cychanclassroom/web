<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Physics Chapter 1 Practice</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 24px;
    background-color: #f7f9fc;
}
.question-block {
    background: #ffffff;
    padding: 18px;
    margin: 12px 0;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.08);
}
.option-btn {
    padding: 9px 16px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    background: #3478f6;
    color: white;
    font-size: 15px;
    cursor: pointer;
}
#submitAllBtn {
    padding: 12px 24px;
    background-color: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 17px;
    cursor: pointer;
    margin-top: 20px;
}
.stat-button {
    padding: 7px 14px;
    margin-top: 10px;
    background: #8e44ad;
    color: white;
    border: none;
    border-radius: 5px;
    display: none; /* 預設隱藏統計按鈕 */
}
.history-record {
    margin-top: 8px;
    font-size: 14px;
    color: #444;
}
</style>
</head>
<body>

<h2>Physics Book 1 Chapter 1 Exercise</h2>
<div id="questionList"></div>
<button id="submitAllBtn">提交所有答案</button>

<script>
// ========= 你只需要改這兩行 =========
const SUPABASE_URL = "https://vonnkewineorstjpmunt.supabase.co";
const SUPABASE_API_KEY = "sb_publishable_QHFJjW60y4g5-s-FhLElTw_VXJMTD7a";
// ====================================

// 固定參數：phy book 1 chapter 1
const subject = "phy";
const book_no = 1;
const chapter_no = 1;
const q_type = "mc";
const student_sid = "4B01"; // 可改學生編號

let allQuestions = [];
let userSelectedAnswers = {};

// 載入 phy book1 chapter1 所有題目
async function loadAllQuestions() {
    const response = await fetch(
        `${SUPABASE_URL}/rest/v1/questions?subject=eq.${subject}&book_no=eq.${book_no}&chapter_no=eq.${chapter_no}&q_type=eq.${q_type}`,
        {
            headers: {
                apikey: SUPABASE_API_KEY,
                Authorization: `Bearer ${SUPABASE_API_KEY}`
            }
        }
    );
    allQuestions = await response.json();
    renderQuestionPage();
}

// 獲取該學生每題歷史答題次數
async function getStudentHistoryData() {
    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/records?sid=eq.${student_sid}&subject=eq.${subject}&book_no=eq.${book_no}&chapter_no=eq.${chapter_no}`,
        {
            headers: {
                apikey: SUPABASE_API_KEY,
                Authorization: `Bearer ${SUPABASE_API_KEY}`
            }
        }
    );
    const records = await res.json();
    let history = {};

    records.forEach(item => {
        if (!history[item.q_num]) {
            history[item.q_num] = { correct: 0, wrong: 0 };
        }
        if (item.is_correct) history[item.q_num].correct++;
        else history[item.q_num].wrong++;
    });
    return history;
}

// 渲染頁面
async function renderQuestionPage() {
    const container = document.getElementById("questionList");
    container.innerHTML = "";
    const history = await getStudentHistoryData();

    allQuestions.forEach(q => {
        const div = document.createElement("div");
        div.className = "question-block";
        div.innerHTML = `
            <p><strong>${q.q_num}. ${q.content}</strong></p>
            <button class="option-btn" onclick="pickAnswer(${q.q_num},'A')">A</button>
            <button class="option-btn" onclick="pickAnswer(${q.q_num},'B')">B</button>
            <button class="option-btn" onclick="pickAnswer(${q.q_num},'C')">C</button>
            <button class="option-btn" onclick="pickAnswer(${q.q_num},'D')">D</button>
            <div class="history-record">
                歷史記錄：答對 ${history[q.q_num]?.correct || 0} 次 / 答錯 ${history[q.q_num]?.wrong || 0} 次
            </div>
            <button class="stat-button" id="personalStat${q.q_num}">個人統計</button>
            <button class="stat-button" id="classStat${q.q_num}">全班統計</button>
        `;
        container.appendChild(div);
    });
}

// 儲存答案
function pickAnswer(qnum, ans) {
    userSelectedAnswers[qnum] = ans;
}

// 提交答案上傳 Supabase
async function submitAllAnswers() {
    const payload = [];
    allQuestions.forEach(q => {
        const ans = userSelectedAnswers[q.q_num];
        if (!ans) return;
        payload.push({
            sid: student_sid,
            subject: subject,
            book_no: book_no,
            chapter_no: chapter_no,
            q_type: q_type,
            q_num: q.q_num,
            student_ans: ans,
            correct_ans: q.answer,
            is_correct: ans === q.answer
        });
    });

    await fetch(`${SUPABASE_URL}/rest/v1/records`, {
        method: "POST",
        headers: {
            apikey: SUPABASE_API_KEY,
            Authorization: `Bearer ${SUPABASE_API_KEY}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    // 提交成功 → 顯示所有統計按鈕
    document.querySelectorAll(".stat-button").forEach(btn => {
        btn.style.display = "inline-block";
    });

    // 刷新歷史紀錄
    renderQuestionPage();
}

document.getElementById("submitAllBtn").addEventListener("click", submitAllAnswers);
loadAllQuestions();
</script>
</body>
</html>
