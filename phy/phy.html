<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一課｜溫度與溫度計｜學生登入版</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f7fa;padding:20px;margin:0}

/* 登入框 */
.login-box{
  max-width:400px;margin:60px auto;background:white;
  padding:30px;border-radius:16px;box-shadow:0 4px 16px #0001;
}
.login-box h2{text-align:center;margin-bottom:20px}
.login-box input{
  width:100%;padding:12px 14px;margin:8px 0;
  border:1px solid #ddd;border-radius:8px;font-size:16px;
}
.login-box button{
  width:100%;padding:14px;background:#28a745;color:white;
  border:none;border-radius:8px;font-size:16px;margin-top:10px;cursor:pointer;
}

/* 主系統（預設隱藏） */
.main-system{display:none}
.user-info{text-align:center;font-size:16px;margin:10px 0;color:#333}
.title{text-align:center;font-size:24px;margin:20px 0}

/* 分頁 */
.page-nav{text-align:center;margin-bottom:20px}
.page-btn{padding:10px 16px;margin:0 4px;border:none;border-radius:6px;background:#cce7ff;cursor:pointer}
.page-btn.active{background:#66b3ff;color:#fff}

/* 題目 */
.question-item{
  background:white;border-radius:12px;padding:22px;
  margin:0 auto 22px auto;max-width:920px;display:none;
}
.question-item.show{display:block}
.q-label{font-size:20px;font-weight:bold;margin-bottom:12px}
.question-item img{max-width:100%;height:auto;border-radius:8px;margin-bottom:18px}
.ans-btns{display:flex;gap:12px;margin-bottom:14px}
.ans-btns button{
  flex:1;padding:14px;font-size:16px;border:none;
  border-radius:8px;background:#cce7ff;cursor:pointer;
}
.ans-btns button:disabled{background:#ccc;color:#666}
.result{padding:16px;border-radius:8px;display:none;white-space:pre-wrap}
.correct{background:#d1f0e3;color:#0a5633}
.wrong{background:#ffe1e3;color:#842029}
.stat{margin-top:10px;font-size:15px;padding:8px;background:#f0f7ff;border-radius:6px}
.sync-bar{text-align:center;margin:20px 0;display:none}
.sync-bar.show{display:block}
.sync-btn{padding:14px 30px;background:#28a745;color:white;border:none;border-radius:8px;cursor:pointer}
</style>
</head>

<body>

<!-- 登入畫面 -->
<div class="login-box" id="loginBox">
  <h2>學生登入</h2>
  <input id="sid" placeholder="學號 (例如 s001)">
  <input id="spw" type="password" placeholder="密碼">
  <button onclick="studentLogin()">登入</button>
</div>

<!-- 主系統（登入後先顯示） -->
<div class="main-system" id="mainSystem">
  <div class="user-info" id="userInfo">登入中...</div>
  <div class="title">Book 1 第一課｜溫度與溫度計</div>

  <div class="page-nav">
    <button class="page-btn active" onclick="showPage(1)">1–10</button>
    <button class="page-btn" onclick="showPage(2)">11–20</button>
  </div>

  <!-- Q1 -->
  <div class="question-item show" data-page="1" data-qid="1">
    <div class="q-label">Q1</div>
    <img src="https://cdn.jsdelivr.net/gh/cychanclassroom/dsePhyBook@main/MC/book1/ch01/DSE_Phy_Bk1_Ch01_MC001.png">
    <div class="ans-btns">
      <button onclick="check(1,'A')">A</button>
      <button onclick="check(1,'B')">B</button>
      <button onclick="check(1,'C')">C</button>
      <button onclick="check(1,'D')">D</button>
    </div>
    <div class="result" id="r1"></div>
    <div class="stat" id="s1">載入中...</div>
  </div>

  <!-- Q2 -->
  <div class="question-item show" data-page="1" data-qid="2">
    <div class="q-label">Q2</div>
    <img src="https://cdn.jsdelivr.net/gh/cychanclassroom/dsePhyBook@main/MC/book1/ch01/DSE_Phy_Bk1_Ch01_MC002.png">
    <div class="ans-btns">
      <button onclick="check(2,'A')">A</button>
      <button onclick="check(2,'B')">B</button>
      <button onclick="check(2,'C')">C</button>
      <button onclick="check(2,'D')">D</button>
    </div>
    <div class="result" id="r2"></div>
    <div class="stat" id="s2">載入中...</div>
  </div>

  <!-- Q3 ~ Q20 直接貼你自己題目 -->
  <div class="question-item show" data-page="1" data-qid="3">
    <div class="q-label">Q3</div>
    <img src="https://cdn.jsdelivr.net/gh/cychanclassroom/dsePhyBook@main/MC/book1/ch01/DSE_Phy_Bk1_Ch01_MC003.png">
    <div class="ans-btns"><button onclick="check(3,'A')">A</button><button onclick="check(3,'B')">B</button><button onclick="check(3,'C')">C</button><button onclick="check(3,'D')">D</button></div>
    <div class="result" id="r3"></div><div class="stat" id="s3"></div>
  </div>

  <div class="sync-bar" data-page="1">
    <button class="sync-btn" onclick="submitPage(1)">提交 1–10 題</button>
  </div>
  <div class="sync-bar" data-page="2">
    <button class="sync-btn" onclick="submitPage(2)">提交 11–20 題</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===================== 你只填這兩個 =====================
const SUPABASE_URL = "https://vonnkewineorstjpmunt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QHFJjW60y4g5-s-FhLElTw_VXJMTD7a";
// ======================================================

const UNIT = 1;
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentSid = "";
let tempAnswers = [];

// 答案
const ansData = {
1:{ans:"B",expl:"攝氏溫標高定點100°C"},
2:{ans:"C",expl:"液體受熱膨脹"},
3:{ans:"A",expl:"華氏和開氏溫標"},
4:{ans:"D",expl:"乾冰溫度最低"},
5:{ans:"D",expl:"體積大膨脹多"},
6:{ans:"B",expl:"高於120°C"},
7:{ans:"B",expl:"溫和變化細"},
8:{ans:"B",expl:"質量不會變"},
9:{ans:"D",expl:"紅外線溫度計"},
10:{ans:"C",expl:"線性關係"},
11:{ans:"C",expl:"55°C"},
12:{ans:"A",expl:"管幼更靈敏"},
13:{ans:"B",expl:"低定點0°C"},
14:{ans:"D",expl:"62.5°C"},
15:{ans:"D",expl:"水銀可量高溫"},
16:{ans:"A",expl:"冰點0°C"},
17:{ans:"B",expl:"溫差少於5°C"},
18:{ans:"A",expl:"溫度表示冷熱"},
19:{ans:"B",expl:"線性對應"},
20:{ans:"D",expl:"60°C"}
};

// 登入
async function studentLogin() {
  const sid = document.getElementById("sid").value.trim();
  const pw = document.getElementById("spw").value.trim();

  const { data, error } = await sb.from("students")
    .select("id,name")
    .eq("id", sid)
    .eq("pw", pw)
    .single();

  if (!data) {
    alert("學號或密碼錯誤");
    return;
  }

  currentSid = data.id;
  loginBox.style.display = "none";
  mainSystem.style.display = "block";
  userInfo.innerText = "學生：" + data.name + " (" + currentSid + ")";
  loadMyStats();
  showPage(1);
}

// 答題
async function check(qid, sel) {
  const ok = (sel === ansData[qid].ans);
  const res = document.getElementById("r"+qid);
  res.style.display = "block";
  res.className = ok ? "result correct" : "result wrong";
  res.innerText = ok ? "✅ 正確\n" + ansData[qid].expl : "❌ 錯誤\n正確："+ansData[qid].ans+"\n"+ansData[qid].expl;

  document.querySelectorAll(`[data-qid="${qid}"] button`).forEach(b=>b.disabled=true);
  tempAnswers.push({ qid, correct:ok });
}

// 提交
async function submitPage(page) {
  if (!currentSid) { alert("請先登入"); return; }
  if (!confirm("確定提交？")) return;

  for (let item of tempAnswers) {
    await sb.from("records").insert([{
      qid: item.qid,
      correct: item.correct,
      unit: UNIT,
      sid: currentSid
    }]);
  }
  alert("提交成功！");
  loadMyStats();
  resetAll();
}

// 只載入自己的紀錄
async function loadMyStats() {
  const { data } = await sb.from("records")
    .select("*")
    .eq("unit", UNIT)
    .eq("sid", currentSid);

  for (let q=1;q<=20;q++){
    const c = data?.filter(x=>x.qid==q&&x.correct).length||0;
    const w = data?.filter(x=>x.qid==q&&!x.correct).length||0;
    const e = document.getElementById("s"+q);
    if (e) e.innerText = `✅ 對：${c} 次｜❌ 錯：${w} 次`;
  }
}

function resetAll() {
  document.querySelectorAll(".ans-btns button").forEach(b=>b.disabled=false);
  document.querySelectorAll(".result").forEach(r=>r.style.display="none");
  tempAnswers = [];
}

function showPage(p) {
  document.querySelectorAll(".page-btn").forEach((btn,i)=>btn.classList.toggle("active",i+1===p));
  document.querySelectorAll(".question-item").forEach(item=>item.classList.toggle("show",+item.dataset.page===p));
  document.querySelectorAll(".sync-bar").forEach(bar=>bar.classList.toggle("show",+bar.dataset.page===p));
  resetAll();
}
</script>
</body>
</html>
