let rightSet, wrongSet;

// жү“й–Ӣз¶Ій Ғ вҶ’ е„Әе…ҲдёӢијү GitHub жңҖж–°иЁҳйҢ„
window.onload = async function(){
  await syncFromGitHub();
  renderAllStats();
}

// зӯ”йЎҢж ёеҝғпјҲйҒёе®ҢеҚійҺ–гҖҒеҚіеӯҳжң¬ең°пјү
function check(qid, choice) {
  const resBox = document.getElementById(`r${qid}`);
  const box = document.querySelector(`[data-qid="${qid}"]`);
  const btns = box.querySelectorAll("button");
  
  // йҺ–жүҖжңүжҢүйҲ•
  btns.forEach(b => b.disabled = true);
  
  const correctAns = ansData[qid].ans;
  const expl = ansData[qid].expl;

  resBox.style.display = "block";
  if (choice === correctAns) {
    resBox.className = "result correct";
    resBox.innerHTML = `вң… жӯЈзўә\nзӯ”жЎҲпјҡ${correctAns}\nи§ЈйҮӢпјҡ${expl}`;
    rightSet.add(qid);
    wrongSet.delete(qid);
  } else {
    resBox.className = "result wrong";
    resBox.innerHTML = `вқҢ йҢҜиӘӨ\nжӯЈзўәзӯ”жЎҲпјҡ${correctAns}\nи§ЈйҮӢпјҡ${expl}`;
    wrongSet.add(qid);
    rightSet.delete(qid);
  }

  saveLocal();
  renderOneStat(qid);
}

// жң¬ең°е„Іеӯҳ
function saveLocal() {
  localStorage.setItem("right", JSON.stringify([...rightSet]));
  localStorage.setItem("wrong", JSON.stringify([...wrongSet]));
}

// йЎҜзӨәзөұиЁҲ
function renderOneStat(qid) {
  const s = document.getElementById(`s${qid}`);
  const r = rightSet.has(qid) ? "вң… жӣҫзӯ”е°Қ" : "";
  const w = wrongSet.has(qid) ? "вқҢ жӣҫзӯ”йҢҜ" : "";
  s.innerText = (r + " " + w).trim() || "рҹ“қ жңӘдҪңзӯ”";
}

function renderAllStats() {
  for(let i=1; i<=20; i++) renderOneStat(i);
}

// еҫһ GitHub дёӢијүжңҖж–°иЁҳйҢ„
async function syncFromGitHub() {
  try {
    const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE_PATH}`, {
      headers: { Authorization: `token ${TOKEN}` }
    });
    const data = await res.json();
    const content = JSON.parse(atob(data.content));
    localStorage.setItem("right", JSON.stringify(content.right || []));
    localStorage.setItem("wrong", JSON.stringify(content.wrong || []));
  } catch (e) {
    console.log("дҪҝз”Ёжң¬ең°иЁҳйҢ„");
  }

  rightSet = new Set(JSON.parse(localStorage.getItem("right") || "[]"));
  wrongSet = new Set(JSON.parse(localStorage.getItem("wrong") || "[]"));
}

// й—ңй–үй Ғйқў вҶ’ иҮӘеӢ•еҗҢжӯҘ 1 ж¬ЎеҲ° GitHub
async function syncToGitHub() {
  const payload = { right: [...rightSet], wrong: [...wrongSet] };
  const encoded = btoa(JSON.stringify(payload));

  try {
    const shaRes = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE_PATH}`, {
      headers: { Authorization: `token ${TOKEN}` }
    });
    const shaData = await shaRes.json();
    const sha = shaData.sha;

    await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE_PATH}`, {
      method: "PUT",
      headers: {
        Authorization: `token ${TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "иҮӘеӢ•еҗҢжӯҘзӯ”йЎҢиЁҳйҢ„",
        content: encoded,
        sha: sha
      })
    });
  } catch (e) {
    console.log("еҗҢжӯҘеӨұж•—пјҲеҸҜеҝҪз•Ҙпјү");
  }
}

window.addEventListener("beforeunload", syncToGitHub);

// еҲҶй ҒеҠҹиғҪпјҲдҝқз•ҷдҪ еҺҹжң¬пјү
function showPage(page) {
  document.querySelectorAll('.page-btn').forEach((btn,i)=>{
    btn.classList.toggle('active', i+1===page);
  });
  document.querySelectorAll('.question-item').forEach(item=>{
    item.classList.toggle('show', +item.dataset.page === page);
  });
}
</script>
