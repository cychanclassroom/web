<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===================== 僅需填寫這裡 =====================
const SUPABASE_URL = "https://vonnkewineorstjpmunt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QHFJjW60y4g5-s-FhLElTw_VXJMTD7a";
// ======================================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ansData = {
1:"B",2:"C",3:"A",4:"D",5:"D",6:"B",7:"B",8:"B",9:"D",10:"C",
11:"C",12:"A",13:"B",14:"D",15:"D",16:"A",17:"B",18:"A",19:"B",20:"D"
};

let tempAnswers = [];

window.onload = async function () {
  try { await loadStats(); } catch (e) { console.error(e); }
  resetAll();
  showPage(1);
};

async function check(qid, sel) {
  const correct = sel === ansData[qid];
  const res = document.getElementById(`r${qid}`);
  res.style.display = "block";
  res.className = correct ? "result correct" : "result wrong";
  res.innerText = correct ? "✅ 正確\n答案："+ansData[qid] : "❌ 錯誤\n正確："+ansData[qid];
  
  document.querySelectorAll(`[data-qid="${qid}"] button`).forEach(b=>b.disabled=true);
  tempAnswers.push({ qid, correct });
}

async function submitPage(page) {
  if (!confirm("確定提交？")) return;
  for (let item of tempAnswers) {
    await sb.from("records").insert([{ qid: item.qid, correct: item.correct }]);
  }
  alert("✅ 提交成功！");
  resetAll();
  loadStats();
}

async function loadStats() {
  const { data } = await sb.from("records").select("*");
  for (let q=1;q<=20;q++) {
    const ok = data?.filter(x=>x.qid===q&&x.correct).length || 0;
    const no = data?.filter(x=>x.qid===q&&!x.correct).length || 0;
    document.getElementById(`s${q}`).innerText = `📊 答對 ${ok} 次｜答錯 ${no} 次`;
  }
}

function resetAll() {
  document.querySelectorAll(".ans-btns button").forEach(b=>b.disabled=false);
  document.querySelectorAll(".result").forEach(r=>r.style.display="none");
  tempAnswers = [];
}

function showPage(p) {
  document.querySelectorAll(".page-btn").forEach((btn,i)=>btn.classList.toggle("active",i+1===p));
  document.querySelectorAll(".question-item").forEach(item=>item.classList.toggle("show",+item.dataset.page===p));
  document.querySelectorAll(".sync-bar").forEach(bar=>bar.classList.toggle("show",+bar.dataset.page===p));
  resetAll();
}
</script>
