<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>答题统计终极版</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f7fa;padding:20px;}
.login-box{max-width:400px;margin:60px auto;background:white;padding:30px;border-radius:16px;box-shadow:0 4px 16px #0001;}
.login-box input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
.login-box button{width:100%;padding:14px;background:#28a745;color:white;border:none;border-radius:8px;margin-top:10px}

.main-system{display:none}
.user-info{text-align:center;margin:10px 0}
.question-item{background:white;border-radius:12px;padding:22px;margin:0 auto 22px;max-width:920px;}
.q-label{font-size:20px;font-weight:bold;margin-bottom:12px}
.ans-btns{display:flex;gap:12px;margin-bottom:14px}
.ans-btns button{flex:1;padding:14px;border:none;border-radius:8px;background:#cce7ff;cursor:pointer}
.ans-btns button:disabled{background:#ccc}

.result{padding:16px;border-radius:8px;margin:10px 0;display:none;white-space:pre-wrap}
.correct{background:#d1f0e3;color:#0a5633}
.wrong{background:#ffe1e3;color:#842029}

/* 两个统计按钮 */
.stat-row{display:flex;gap:10px;margin:12px 0;}
.stat-row button{flex:1;padding:12px;border:none;border-radius:8px;color:white;cursor:pointer}
.btn-me{background:#4285f4;}
.btn-class{background:#ff9800;}

/* 统计面板 */
.stat-box{background:#f8f9fa;padding:14px;border-radius:8px;margin-top:10px;display:none;white-space:pre-wrap}
</style>
</head>

<body>

<!-- 登录 -->
<div class="login-box" id="loginBox">
  <h2>学生登录</h2>
  <input id="sid" placeholder="学号">
  <input id="spw" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
</div>

<!-- 主系统 -->
<div class="main-system" id="mainSystem">
  <div class="user-info" id="userInfo"></div>

  <!-- Q1 -->
  <div class="question-item" data-qid="1">
    <div class="q-label">Q1</div>
    <img src="https://cdn.jsdelivr.net/gh/cychanclassroom/dsePhyBook@main/MC/book1/ch01/DSE_Phy_Bk1_Ch01_MC001.png">
    <div class="ans-btns">
      <button onclick="check(1,'A')">A</button>
      <button onclick="check(1,'B')">B</button>
      <button onclick="check(1,'C')">C</button>
      <button onclick="check(1,'D')">D</button>
    </div>
    <div class="result" id="r1"></div>

    <div class="stat-row">
      <button class="btn-me" onclick="showMyAnsCount(1)">📝 我本题答案统计</button>
      <button class="btn-class" onclick="showClassLastAns(1)">📊 全班最后一次答案</button>
    </div>

    <div class="stat-box" id="stat1"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===================== 你只需填这里 =====================
const SUPABASE_URL = "https://vonnkewineorstjpmunt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QHFJjW60y4g5-s-FhLElTw_VXJMTD7a";
// ======================================================

const SUBJECT = "phy";
const UNIT = 1;
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentSid = "";

const ansData = {
1:{ans:"B",expl:"摄氏温标高定点100°C"}
};

// 登录
async function login() {
  const sid = document.getElementById("sid").value.trim();
  const pw = document.getElementById("spw").value.trim();
  const { data } = await sb.from("students")
    .select("id,name").eq("id", sid).eq("pw", pw).single();

  if (!data) { alert("学号或密码错误"); return; }
  currentSid = data.id;
  loginBox.style.display = "none";
  mainSystem.style.display = "block";
  userInfo.innerText = "学生：" + data.name;
}

// 答题并提交
async function check(qid, sel) {
  if (!currentSid) { alert("请先登录"); return; }

  const correct = sel === ansData[qid].ans;
  const res = document.getElementById("r"+qid);
  res.style.display = "block";
  res.className = correct ? "result correct" : "result wrong";
  res.innerText = correct ? "✅ 正确" : "❌ 错误\n正确："+ansData[qid].ans;

  // 提交答案到数据库
  await sb.from("records").insert([{
    sid: currentSid,
    subject: SUBJECT,
    unit: UNIT,
    qid: qid,
    answer: sel,
    correct: correct
  }]);

  // 禁用按钮
  document.querySelectorAll(`[data-qid="${qid}"] button`).forEach(b=>b.disabled=true);
  alert("已提交答案！");
}

// --------------------- 按钮1：我本题所有答案统计（A/B/C/D各多少次） ---------------------
async function showMyAnsCount(qid) {
  const { data } = await sb.from("records")
    .select("answer")
    .eq("sid", currentSid)
    .eq("subject", SUBJECT)
    .eq("unit", UNIT)
    .eq("qid", qid);

  let a = 0, b = 0, c = 0, d = 0;
  data.forEach(x => {
    if (x.answer === "A") a++;
    if (x.answer === "B") b++;
    if (x.answer === "C") c++;
    if (x.answer === "D") d++;
  });

  const txt = `📝 你在 Q${qid} 所有历史答案统计：
A：${a}次　B：${b}次　C：${c}次　D：${d}次`;

  const box = document.getElementById("stat"+qid);
  box.style.display = "block";
  box.innerText = txt;
}

// --------------------- 按钮2：全班最后一次答案统计 ---------------------
async function showClassLastAns(qid) {
  const { data } = await sb.from("records")
    .select("sid, answer")
    .eq("subject", SUBJECT)
    .eq("unit", UNIT)
    .eq("qid", qid);

  // 每人只留最后一笔
  const map = new Map();
  data.forEach(row => map.set(row.sid, row.answer));

  let a = 0, b = 0, c = 0, d = 0;
  map.forEach(ans => {
    if (ans === "A") a++;
    if (ans === "B") b++;
    if (ans === "C") c++;
    if (ans === "D") d++;
  });

  const txt = `📊 Q${qid} 全班最后一次答案统计
A：${a}人　B：${b}人　C：${c}人　D：${d}人`;

  const box = document.getElementById("stat"+qid);
  box.style.display = "block";
  box.innerText = txt;
}
</script>
</body>
</html>
