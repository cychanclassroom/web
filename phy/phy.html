<style>
*{box-sizing:border-box;font-family:Arial,sans-serif;margin:0;padding:0}
body{background:#f5f7fa;padding:20px}

/* 登入 */
.login-box{max-width:400px;margin:60px auto;background:white;padding:30px;border-radius:16px;box-shadow:0 4px 16px #0001}
.login-box h2{text-align:center;margin-bottom:20px}
.login-box input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
.login-box button{width:100%;padding:14px;background:#28a745;color:white;border:none;border-radius:8px;margin-top:10px}

.main-system{display:none}
.user-info{text-align:center;margin:10px;font-size:16px}

.title{text-align:center;font-size:26px;margin-bottom:20px;color:#222}
.page-nav{text-align:center;margin-bottom:24px}
.page-btn{padding:10px 16px;margin:0 4px;border:none;border-radius:6px;background:#cce7ff;cursor:pointer}
.page-btn.active{background:#66b3ff;color:#fff}

.question-item{background:white;border-radius:12px;padding:22px;margin:0 auto 22px auto;max-width:920px;border:1px solid #ddd;display:none}
.question-item.show{display:block}
.q-label{font-size:20px;font-weight:bold;margin-bottom:12px;color:#222}
.question-item img{max-width:100%;height:auto;border-radius:8px;margin-bottom:18px}
.ans-btns{display:flex;gap:12px;margin-bottom:14px}
.ans-btns button{flex:1;padding:14px;font-size:16px;border:none;border-radius:8px;background:#cce7ff;color:#004488;cursor:pointer}
.ans-btns button:hover{background:#b3d9ff}
.ans-btns button:disabled{background:#ccc;color:#666}

.result{padding:16px;border-radius:8px;font-size:18px;line-height:1.6;display:none;white-space:pre-wrap}
.correct{background:#d1e7dd;color:#0a5633;border:1px solid #badbcc}
.wrong{background:#f8d7da;color:#842029;border:1px solid #f5c2c7}

/* 歷史對錯次數（打開就見） */
.history-box{margin:10px 0;padding:10px;background:#e9ecef;border-radius:8px;font-size:15px}

/* 統計按鈕（提交先出現） */
.stat-row{display:none;gap:10px;margin:12px 0}
.stat-row.show{display:flex}
.stat-row button{flex:1;padding:12px;border:none;border-radius:8px;color:white;cursor:pointer}
.btn-me{background:#4285f4}
.btn-class{background:#ff9800}

.stat-panel{background:#f8f9fa;padding:14px;border-radius:8px;margin-top:10px;display:none;white-space:pre-wrap}

/* 頁底總提交 */
#finalSubmit{
  display:block;width:90%;max-width:920px;margin:30px auto;
  padding:16px;font-size:18px;background:#28a745;color:white;
  border:none;border-radius:10px;cursor:pointer
}
#finalSubmit:disabled{background:#999}
</style>
</head>

// 登入
async function login() {
  const sid = document.getElementById("sid").value.trim();
  const pw = document.getElementById("spw").value.trim();
  const { data } = await sb.from("students").select("id,name").eq("id",sid).eq("pw",pw).single();
  if (!data) { alert("學號或密碼錯誤"); return; }
  currentSid = data.id;
  loginBox.style.display = "none";
  mainSystem.style.display = "block";
  userInfo.innerText = "學生："+data.name;
  loadMyAllHistory();
}

// 打開網頁 → 每題顯示曾答對 / 曾答錯
async function loadMyAllHistory() {
  const { data } = await sb.from("records")
    .select("qid, correct")
    .eq("sid", currentSid)
    .eq("subject", SUBJECT)
    .eq("unit", UNIT);

  let stat = {};
  for(let q=1;q<=20;q++) stat[q] = {right:0, wrong:0};
  data.forEach(row=>{
    if (row.correct) stat[row.qid].right++;
    else stat[row.qid].wrong++;
  });

  for(let q=1;q<=20;q++){
    const el = document.getElementById("history"+q);
    if (el) el.innerText = `✅ 曾答對：${stat[q].right} 次　❌ 曾答錯：${stat[q].wrong} 次`;
  }
}

// 即時批改
function checkInstant(qid, sel) {
  studentAnswers[qid] = sel;
  const res = document.getElementById("r"+qid);
  const ok = sel === ansData[qid].ans;
  res.style.display = "block";
  res.className = ok ? "result correct" : "result wrong";
  res.innerText = ok ? `✅ 正確\n答案：${ansData[qid].ans}\n解釋：${ansData[qid].expl}`
                     : `❌ 錯誤\n正確：${ansData[qid].ans}\n解釋：${ansData[qid].expl}`;
  document.querySelectorAll(`[data-qid="${qid}"] .ans-btns button`).forEach(b=>b.disabled=true);
}

// 總提交
async function submitAllAnswers() {
  if (!currentSid) { alert("請先登入"); return; }
  if (Object.keys(studentAnswers).length === 0) { alert("請先作答"); return; }

  let arr = [];
  for (const q in studentAnswers) {
    const sel = studentAnswers[q];
    const ok = sel === ansData[q].ans;
    arr.push({sid:currentSid, subject:SUBJECT, unit:UNIT, qid:Number(q), answer:sel, correct:ok});
  }

  await sb.from("records").insert(arr);
  alert("✅ 提交成功！");
  document.getElementById("finalSubmit").disabled = true;

  // 提交後顯示統計按鈕
  for (const q in studentAnswers) {
    document.getElementById("btnRow"+q).classList.add("show");
  }
  loadMyAllHistory();
}

// 按鈕1：我的答案統計(總次數)
async function showMyStats(qid) {
  const { data } = await sb.from("records")
    .select("answer")
    .eq("sid", currentSid)
    .eq("subject", SUBJECT)
    .eq("unit", UNIT)
    .eq("qid", qid);

  let a = 0, b = 0, c = 0, d = 0;
  data.forEach(x => {
    if (x.answer === "A") a++;
    if (x.answer === "B") b++;
    if (x.answer === "C") c++;
    if (x.answer === "D") d++;
  });

  const total = data.length;
  const box = document.getElementById("stat"+qid);
  box.style.display = "block";
  box.innerText = `📝 Q${qid} 我的答案統計(${total}次)
A：${a} 次
B：${b} 次
C：${c} 次
D：${d} 次`;
}

// 按鈕2：全部學生的統計(總人數)
async function showClassLast(qid) {
  // 1. 先取所有紀錄，按時間由新到舊排序
  const { data } = await sb.from("records")
    .select("sid, answer, created_at")
    .eq("subject", SUBJECT)
    .eq("unit", UNIT)
    .eq("qid", qid)
    .order("created_at", { ascending: false }); // 新紀錄排最前

  // 2. 每個學生只保留第一條（即最後一次作答）
  const uniqueStudents = new Map();
  for (const row of data) {
    if (!uniqueStudents.has(row.sid)) {
      uniqueStudents.set(row.sid, row.answer);
    }
  }

  // 3. 統計A/B/C/D
  let a = 0, b = 0, c = 0, d = 0;
  uniqueStudents.forEach(ans => {
    if (ans === "A") a++;
    if (ans === "B") b++;
    if (ans === "C") c++;
    if (ans === "D") d++;
  });

  const total = uniqueStudents.size; // 呢個先係真實總人數
  const box = document.getElementById("stat"+qid);
  box.style.display = "block";
  box.innerText = `📊 Q${qid} 全部學生的統計(${total}人)
A：${a} 人
B：${b} 人
C：${c} 人
D：${d} 人`;
}

// 分頁
function showPage(p) {
  document.querySelectorAll(".page-btn").forEach((btn,i)=>btn.classList.toggle("active",i+1===p));
  document.querySelectorAll(".question-item").forEach(item=>item.classList.toggle("show",+item.dataset.page===p));
}

// 綁定按鈕
document.getElementById("finalSubmit").onclick = submitAllAnswers;
</script>
