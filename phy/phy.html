<script>
// ========== 只填新生成嘅 TOKEN ==========
const USER = "cychanclassroom";
const REPO = "web";
const TOKEN = "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";
const FILE = "phy/record.json";
// =======================================

const ansData = {
1:"B",2:"C",3:"A",4:"D",5:"D",6:"B",7:"B",8:"B",9:"D",10:"C",
11:"C",12:"A",13:"B",14:"D",15:"D",16:"A",17:"B",18:"A",19:"B",20:"D"
};

let right = new Set();
let wrong = new Set();
let cloudRight = [], cloudWrong = [];

// 每次打開：全部題目重置可答
window.onload = async ()=>{
  // 讀雲端數據
  try{
    const r = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`,{
      headers:{Authorization:`token ${TOKEN}`}
    });
    const d = await r.json();
    const j = JSON.parse(atob(d.content));
    cloudRight = j.right||[]; cloudWrong = j.wrong||[];
    document.getElementById("summary").innerText = `📊 雲端記錄：答對${cloudRight.length}｜答錯${cloudWrong.length}`;
  }catch(e){}

  // 重置所有按鈕
  document.querySelectorAll(".ans-btns button").forEach(b=>b.disabled=false);
  document.querySelectorAll(".result").forEach(r=>r.style.display="none");
};

// 答題
function check(qid,sel){
  const btns = document.querySelector(`[data-qid="${qid}"]`).querySelectorAll("button");
  btns.forEach(b=>b.disabled=true);
  const res = document.getElementById(`r${qid}`);
  res.style.display="block";
  if(sel===ansData[qid]){
    res.className="result correct"; res.innerText=`✅ 正確，答案：${ansData[qid]}`;
    right.add(qid); wrong.delete(qid);
  }else{
    res.className="result wrong"; res.innerText=`❌ 錯誤，正確：${ansData[qid]}`;
    wrong.add(qid); right.delete(qid);
  }
}

// 🔥 強制寫入，無任何阻擋
async function submitNow(){
  const payload = {right:[...right], wrong:[...wrong]};
  const content = btoa(JSON.stringify(payload));
  const shaRes = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`,{
    headers:{Authorization:`token ${TOKEN}`}
  });
  const sha = (await shaRes.json()).sha;

  const put = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`,{
    method:"PUT",
    headers:{Authorization:`token ${TOKEN}`,"Content-Type":"application/json"},
    body:JSON.stringify({message:"強制寫入", content, sha})
  });

  if(put.ok) alert("✅ 寫入成功！立即去 GitHub 刷新 json");
  else alert("❌ Token 權限不足，請重製 Token");
}

// 分頁
function showPage(p){
  document.querySelectorAll(".page-btn").forEach((b,i)=>b.classList.toggle("active",i+1===p));
  document.querySelectorAll(".question-item").forEach(q=>q.classList.toggle("show",+q.dataset.page===p));
}
</script>
