<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物理 Chapter 1 MC｜Excalidraw 必成功版</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f7fa;padding:20px}
.title{text-align:center;font-size:26px;margin-bottom:20px}
.page-nav{text-align:center;margin-bottom:24px}
.page-btn{padding:10px 16px;margin:0 4px;border:none;border-radius:6px;background:#cce7ff;cursor:pointer}
.page-btn.active{background:#0071e3;color:#fff}
.question-item{background:white;border-radius:12px;padding:22px;margin:0 auto 22px;max-width:920px;display:none}
.question-item.show{display:block}
.q-label{font-size:20px;font-weight:bold;margin-bottom:12px}
.question-item img{max-width:100%;height:auto;border-radius:8px;margin-bottom:18px}
.ans-btns{display:flex;gap:12px;margin-bottom:14px}
.ans-btns button{flex:1;padding:14px;font-size:16px;border:none;border-radius:8px;background:#cce7ff;color:#004488}
.exbtn{margin-top:10px;padding:12px;width:100%;border:none;border-radius:8px;background:#0071e3;color:white;font-size:15px}
.result{padding:16px;border-radius:8px;display:none}
.correct{background:#d1e7dd}
.wrong{background:#f8d7da}
</style>
</head>
<body>

<div class="title">Book 1 第1課｜✏️ Excalidraw 一按即寫</div>
<div class="page-nav">
<button class="page-btn active" onclick="showPage(1)">1–10</button>
<button class="page-btn" onclick="showPage(2)">11–20</button>
</div>

<!-- Q1 -->
<div class="question-item show" data-page="1">
<div class="q-label">Q1</div>
<img src="https://cdn.jsdelivr.net/gh/cychanclassroom/dsePhyBook@main/MC/book1/ch01/DSE_Phy_Bk1_Ch01_MC001.png">
<div class="ans-btns"><button onclick="check(1,'A')">A</button><button onclick="check(1,'B')">B</button><button onclick="check(1,'C')">C</button><button onclick="check(1,'D')">D</button></div>
<button class="exbtn" onclick="openExcalidraw('https://cdn.jsdelivr.net/gh/cychanclassroom/dsePhyBook@main/MC/book1/ch01/DSE_Phy_Bk1_Ch01_MC001.png')">✏️ 打开 Excalidraw 直接貼圖</button>
<div class="result" id="r1"></div>
</div>

<!-- Q2 -->
<div class="question-item show" data-page="1">
<div class="q-label">Q2</div>
<img src="https://cdn.jsdelivr.net/gh/cychanclassroom/dsePhyBook@main/MC/book1/ch01/DSE_Phy_Bk1_Ch01_MC002.png">
<div class="ans-btns"><button onclick="check(2,'A')">A</button><button onclick="check(2,'B')">B</button><button onclick="check(2,'C')">C</button><button onclick="check(2,'D')">D</button></div>
<button class="exbtn" onclick="openExcalidraw('https://cdn.jsdelivr.net/gh/cychanclassroom/dsePhyBook@main/MC/book1/ch01/DSE_Phy_Bk1_Ch01_MC002.png')">✏️ 打开 Excalidraw 直接貼圖</button>
<div class="result" id="r2"></div>
</div>

<script>
const ansData = {
1:{ans:"B",expl:"攝氏溫標的高定點是 100 °C"},
2:{ans:"C",expl:"玻管液體溫度計中的液體隨溫度膨脹"}
};

function check(qid, choice) {
  const r = document.getElementById('r'+qid);
  r.style.display = 'block';
  if(choice===ansData[qid].ans){
    r.className='result correct';
    r.innerHTML=`✅ 正確\n答案：${ansData[qid].ans}\n解釋：${ansData[qid].expl}`;
  }else{
    r.className='result wrong';
    r.innerHTML=`❌ 錯誤\n正確：${ansData[qid].ans}\n解釋：${ansData[qid].expl}`;
  }
}

function showPage(p){
  document.querySelectorAll('.page-btn').forEach((b,i)=>b.classList.toggle('active',i+1==p));
  document.querySelectorAll('.question-item').forEach(i=>i.classList.toggle('show',+i.dataset.page==p));
}

// ✅ 終極：打開 Excalidraw + 自動複製圖片
async function openExcalidraw(imgUrl) {
  try {
    const blob = await fetch(imgUrl).then(r=>r.blob());
    await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
    alert('✅ 圖片已複製！\n打開 Excalidraw 直接貼上（Ctrl+V / Cmd+V）');
  } catch(e) {
    await navigator.clipboard.writeText(imgUrl);
    alert('✅ 圖片網址已複製！\n貼上即可顯示');
  }
  window.open('https://excalidraw.com','_blank');
}
</script>
</body>
</html>
