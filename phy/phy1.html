<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物理 Book1 Chapter1 MC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif;margin:0;padding:0}
body{background:#f5f7fa;padding:20px}
.login-box{max-width:400px;margin:60px auto;background:#fff;padding:30px;border-radius:16px;box-shadow:0 4px 16px #0001}
.login-box h2{text-align:center;margin-bottom:20px}
.login-box input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
.login-box button{width:100%;padding:14px;background:#28a745;color:#fff;border:none;border-radius:8px;margin-top:10px}
.main{display:none}
.user-info{text-align:center;margin:10px;font-size:16px}
.title{text-align:center;font-size:26px;margin-bottom:20px;color:#222}
.page-nav{text-align:center;margin-bottom:24px}
.page-nav button{padding:10px 16px;margin:0 4px;border:none;border-radius:6px;background:#cce7ff;color:#004488;cursor:pointer}
.page-nav button.active{background:#66b3ff;color:#fff}
.question{background:#fff;border-radius:12px;padding:22px;margin:0 auto 22px auto;max-width:920px;border:1px solid #ddd;display:none}
.question.show{display:block}
.q-title{font-size:20px;font-weight:bold;margin-bottom:12px;color:#222}
.question img{max-width:100%;height:auto;border-radius:8px;margin-bottom:18px}
.ans-row{display:flex;gap:12px;margin-bottom:14px}
.ans-row button{flex:1;padding:14px;font-size:16px;border:none;border-radius:8px;background:#cce7ff;color:#004488;cursor:pointer}
.ans-row button:hover{background:#b3d9ff}
.ans-row button:disabled{background:#ccc;color:#666}
.result{padding:16px;border-radius:8px;font-size:18px;line-height:1.6;display:none;white-space:pre-wrap}
.correct{background:#d1e7dd;color:#0a5633;border:1px solid #badbcc}
.wrong{background:#f8d7da;color:#842029;border:1px solid #f5c2c7}
.history-box{margin:10px 0;padding:10px;background:#e9ecef;border-radius:8px;font-size:15px}
.stat-row{display:none;gap:10px;margin:12px 0}
.stat-row.show{display:flex}
.stat-row button{flex:1;padding:12px;border:none;border-radius:8px;color:#fff;cursor:pointer}
.btn-me{background:#4285f4}
.btn-class{background:#ff9800}
.stat-panel{background:#f8f9fa;padding:14px;border-radius:8px;margin-top:10px;display:none;white-space:pre-wrap}
#finalSubmit{display:block;width:90%;max-width:920px;margin:30px auto;padding:16px;font-size:18px;background:#28a745;color:#fff;border:none;border-radius:10px;cursor:pointer}
#finalSubmit:disabled{background:#999}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h2>學生登入</h2>
  <input type="text" id="sid" placeholder="學號" value="">
  <input type="password" id="pw" placeholder="密碼" value="1234">
  <button onclick="login()">登入</button>
</div>

<div class="main" id="main">
  <div class="user-info" id="userInfo"></div>
  <div class="title">Book 1 Chapter 1 溫度與溫度計 MC 練習</div>

  <div class="page-nav">
    <button class="active" onclick="showPage(1)">1–10</button>
    <button onclick="showPage(2)">11–20</button>
  </div>

  <div id="questionsContainer"></div>
  <button id="finalSubmit" onclick="submitAll()">📤 提交所有答案到系統</button>
</div>

<script>
// --- 只定義一次 Supabase ---
const supabaseUrl = "https://vonnkewineorstjpmunt.supabase.co";
const supabaseKey = "sb_publishable_QHFJjW60y4g5-s-FhLElTw_VXJMTD7a";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentSid = "";
let currentName = "";
let allQuestions = [];
let studentAnswers = {};

// 登入
async function login(){
  const sid = document.getElementById("sid").value.trim();
  const pw = document.getElementById("pw").value.trim();
  if(!sid){alert("請輸入學號");return}
  const {data,error} = await supabase.from("students").select("id,name,pw").eq("id",sid).single();
  if(error || !data || data.pw!==pw){alert("學號或密碼錯誤");return}
  currentSid = data.id;
  currentName = data.name;
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("userInfo").innerText = `學生：${currentName} (${currentSid})`;
  loadQuestions();
}

// 從資料庫讀題
async function loadQuestions(){
  const {data,error} = await supabase.from("questions")
    .select("*")
    .eq("subject","phy")
    .eq("book_no",1)
    .eq("chapter_no",1)
    .eq("q_type","mc")
    .order("q_num",{ascending:true});

  if(error){console.error(error);return}
  allQuestions = data;
  renderQuestions();
  loadStudentHistory();
}

// 渲染題目
function renderQuestions(){
  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";
  allQuestions.forEach(q=>{
    const div = document.createElement("div");
    div.className = "question";
    div.dataset.page = q.q_num<=10 ? 1 : 2;
    div.innerHTML = `
      <div class="q-title">Q${q.q_num}</div>
      <img src="${q.q_img}" alt="題目">
      <div class="ans-row">
        <button onclick="choose(${q.q_num},'A')">A</button>
        <button onclick="choose(${q.q_num},'B')">B</button>
        <button onclick="choose(${q.q_num},'C')">C</button>
        <button onclick="choose(${q.q_num},'D')">D</button>
      </div>
      <div class="result" id="res${q.q_num}"></div>
      <div class="history-box" id="hist${q.q_num}"></div>
      <div class="stat-row" id="statRow${q.q_num}">
        <button class="btn-me" onclick="showMyStat(${q.q_num})">📝 我的答案統計</button>
        <button class="btn-class" onclick="showClassStat(${q.q_num})">📊 全部學生的統計</button>
      </div>
      <div class="stat-panel" id="statPanel${q.q_num}"></div>
    `;
    container.appendChild(div);
  });
  showPage(1);
}

// 切換頁
function showPage(p){
  document.querySelectorAll(".page-nav button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  document.querySelectorAll(".question").forEach(q=>{
    q.classList.toggle("show", Number(q.dataset.page)===p);
  });
}

// 選擇答案
function choose(qnum,ans){
  studentAnswers[qnum] = ans;
  const q = allQuestions.find(x=>x.q_num===qnum);
  const resEl = document.getElementById("res"+qnum);
  resEl.style.display = "block";
  if(ans===q.correct_ans){
    resEl.className = "result correct";
    resEl.innerText = `✅ 正確\n${q.explanation}`;
  }else{
    resEl.className = "result wrong";
    resEl.innerText = `❌ 錯誤，正確答案：${q.correct_ans}\n${q.explanation}`;
  }
  // 鎖定按鈕
  document.querySelector(`.question:nth-child(${qnum}) .ans-row`).querySelectorAll("button").forEach(b=>b.disabled=true);
  document.getElementById("finalSubmit").disabled = false;
}

// 提交所有答案
async function submitAll(){
  const arr = [];
  for(const qnum in studentAnswers){
    const q = allQuestions.find(x=>x.q_num===Number(qnum));
    arr.push({
      sid:currentSid,
      subject:"phy",
      book_no:1,
      chapter_no:1,
      q_num:Number(qnum),
      student_ans:studentAnswers[qnum],
      correct_ans:q.correct_ans,
      is_correct: studentAnswers[qnum]===q.correct_ans
    });
  }
  await supabase.from("answers").insert(arr);
  alert("✅ 提交成功！");
  loadStudentHistory();
}

// 載入個人歷史
async function loadStudentHistory(){
  const {data} = await supabase.from("answers")
    .select("q_num,student_ans,is_correct")
    .eq("sid",currentSid)
    .eq("subject","phy")
    .eq("book_no",1)
    .eq("chapter_no",1);

  allQuestions.forEach(q=>{
    const h = data.find(x=>x.q_num===q.q_num);
    if(h){
      document.getElementById("hist"+q.q_num).innerText = 
        `✅ 曾作答：${h.student_ans} ${h.is_correct?"(正確)":"(錯誤)"}`;
      document.getElementById("statRow"+q.q_num).classList.add("show");
    }
  });
}

// 個人統計
async function showMyStat(qnum){
  const {data} = await supabase.from("answers")
    .select("student_ans")
    .eq("sid",currentSid)
    .eq("q_num",qnum);
  const total = data.length;
  let a=0,b=0,c=0,d=0;
  data.forEach(x=>{
    if(x.student_ans==="A")a++;
    if(x.student_ans==="B")b++;
    if(x.student_ans==="C")c++;
    if(x.student_ans==="D")d++;
  });
  const panel = document.getElementById("statPanel"+qnum);
  panel.style.display = "block";
  panel.innerText = `📝 Q${qnum} 我的答案統計(${total}次)
A：${a} 次
B：${b} 次
C：${c} 次
D：${d} 次`;
}

// 全班統計（穩定版）
async function showClassStat(qnum){
  const {data} = await supabase.from("answers")
    .select("sid,student_ans")
    .eq("q_num",qnum);
  const map = new Map();
  data.forEach(x=>map.set(x.sid,x.student_ans));
  let a=0,b=0,c=0,d=0;
  map.forEach(ans=>{
    if(ans==="A")a++;
    if(ans==="B")b++;
    if(ans==="C")c++;
    if(ans==="D")d++;
  });
  const total = a+b+c+d;
  const panel = document.getElementById("statPanel"+qnum);
  panel.style.display = "block";
  panel.innerText = `📊 Q${qnum} 全部學生的統計(${total}人)
A：${a} 人
B：${b} 人
C：${c} 人
D：${d} 人`;
}
</script>
</body>
</html>
