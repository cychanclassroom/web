<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>DSE 物理 | Book 1 | Chapter 1 | 20題MC</title>
<style>
body{font-family:Arial;margin:20px;background:#f7f9fc;}
.question{background:white;padding:15px;margin:10px 0;border-radius:8px;box-shadow:0 1px 3px #ccc;}
.ans-btn{padding:8px 14px;margin:4px;border:none;border-radius:4px;background:#4285f4;color:white;cursor:pointer;}
#submitAll{padding:10px 20px;background:#0f9d58;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin:20px 0;}
.stat-btn{padding:6px 12px;background:#9c27b0;color:white;border:none;border-radius:4px;margin-top:8px;display:none;}
.history-info{color:#555;margin-top:6px;font-size:14px;}
</style>
</head>
<body>

<h2>經濟練習</h2>
<div id="questionsContainer"></div>
<button id="submitAll">提交所有答案</button>

<script>
// Supabase 配置
const SUPABASE_URL = "https://vonnkewineorstjpmunt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QHFJjW60y4g5-s-FhLElTw_VXJMTD7a";
const sid = "4B01"; // 學生編號
const subject = "econ";
const book_no = 1;
const chapter_no = 1;
const q_type = "mc";

let questions = [];
let userAnswers = {};

// 載入題目
async function loadQuestions() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/questions?subject=eq.${subject}&book_no=eq.${book_no}&chapter_no=eq.${chapter_no}&q_type=eq.${q_type}`,{
    headers: {apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
  });
  questions = await res.json();
  renderQuestions();
}

// 渲染題目（一開始隱藏統計按鈕）
async function renderQuestions() {
  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";

  // 預先載入歷史紀錄
  const history = await getStudentHistory();

  questions.forEach(q => {
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `
      <p><strong>${q.q_num}. ${q.content}</strong></p>
      <button class="ans-btn" onclick="setAnswer(${q.q_num},'A')">A</button>
      <button class="ans-btn" onclick="setAnswer(${q.q_num},'B')">B</button>
      <button class="ans-btn" onclick="setAnswer(${q.q_num},'C')">C</button>
      <button class="ans-btn" onclick="setAnswer(${q.q_num},'D')">D</button>
      <div class="history-info">
        歷史紀錄：答對 ${history[q.q_num]?.correct||0} 次 / 答錯 ${history[q.q_num]?.wrong||0} 次
      </div>
      <button class="stat-btn" id="statBtn${q.q_num}">個人統計</button>
      <button class="stat-btn" id="classStatBtn${q.q_num}">全班統計</button>
    `;
    container.appendChild(div);
  });
}

// 取得學生歷史答題次數
async function getStudentHistory() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/records?sid=eq.${sid}&subject=eq.${subject}&book_no=eq.${book_no}&chapter_no=eq.${chapter_no}`,{
    headers: {apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
  });
  const records = await res.json();
  const hist = {};
  records.forEach(r=>{
    if(!hist[r.q_num]) hist[r.q_num]={correct:0,wrong:0};
    if(r.is_correct) hist[r.q_num].correct++;
    else hist[r.q_num].wrong++;
  });
  return hist;
}

// 設定答案
function setAnswer(qnum, ans) {
  userAnswers[qnum] = ans;
  // 揀答案期間統計按鈕保持隱藏
}

// 提交所有答案
async function submitAll() {
  const payload = [];
  for(const q of questions) {
    const ans = userAnswers[q.q_num];
    if(!ans) continue;
    payload.push({
      sid,subject,book_no,chapter_no,q_type,
      q_num: q.q_num,
      student_ans: ans,
      correct_ans: q.answer,
      is_correct: ans === q.answer
    });
  }

  await fetch(`${SUPABASE_URL}/rest/v1/records`,{
    method:"POST",
    headers: {apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  });

  // 提交成功 → 顯示所有統計按鈕
  document.querySelectorAll(".stat-btn").forEach(btn=>btn.style.display="inline-block");
  
  // 重新載入歷史次數
  renderQuestions();
}

document.getElementById("submitAll").addEventListener("click",submitAll);
loadQuestions();
</script>
</body>
</html>
