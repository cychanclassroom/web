<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物理 Chapter 4 MC 题目｜Supabase 动态版</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif;margin:0;padding:0}
body{background:#f5f7fa;padding:20px}
.title{text-align:center;font-size:26px;margin-bottom:20px;color:#222}
.page-nav{text-align:center;margin-bottom:24px}
.page-btn{padding:10px 16px;margin:0 4px;border:none;border-radius:6px;background:#cce7ff;cursor:pointer}
.page-btn.active{background:#66b3ff;color:#fff}
#questions-container{max-width:1000px;margin:0 auto}
.question-item{background:white;border-radius:12px;padding:22px;margin:0 auto 22px auto;max-width:920px;border:1px solid #ddd;display:none}
.question-item.show{display:block}
.q-number{font-size:20px;font-weight:bold;margin-bottom:10px;color:#004488}
.question-item img{max-width:100%;height:auto;border-radius:8px;margin-bottom:18px}
.ans-btns{display:flex;gap:12px;margin-bottom:14px}
.ans-btns button{flex:1;padding:14px;font-size:16px;border:none;border-radius:8px;background:#cce7ff;color:#004488;cursor:pointer}
.ans-btns button:hover{background:#b3d9ff}
.result{padding:16px;border-radius:8px;font-size:18px;line-height:1.6;display:none;white-space:pre-wrap}
.correct{background:#d1e7dd;color:#0a5633;border:1px solid #badbcc}
.wrong{background:#f8d7da;color:#842029;border:1px solid #f5c2c7}
.loading{text-align:center;font-size:20px;padding:50px;color:#666}
.error{text-align:center;font-size:18px;padding:30px;color:#c00;background:#ffe0e0;border-radius:12px;max-width:600px;margin:20px auto}
</style>
<!-- 引入 Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="title">Book 1 第4課 物理物態變化 選擇題 (Supabase 動態版)</div>
<div class="page-nav" id="page-nav"></div>
<div id="questions-container">
    <div class="loading">載入題目中...</div>
</div>

<script>
    // ==================== 請在這裡填寫你的 Supabase 資料 ====================
    const SUPABASE_URL = "https://vonnkewineorstjpmunt.supabase.co";      // 替換成你的 URL
    const SUPABASE_ANON_KEY = "sb_publishable_QHFJjW60y4g5-s-FhLElTw_VXJMTD7a";                    // 替換成你的 anon key
    // ====================================================================

    // 每頁顯示題數 (與原設計相同，1-10,11-20…)
    const ITEMS_PER_PAGE = 10;

    let allQuestions = [];      // 儲存從 DB 取回的所有題目
    let totalPages = 0;

    // 初始化 Supabase 客戶端
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 從 Supabase 取得題目資料
    async function loadQuestionsFromSupabase() {
        try {
            // 從 phy_question 表讀取所有欄位，按 id 升序排列
            const { data, error } = await supabase
                .from('phy_question')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                console.error('Supabase 錯誤:', error);
                throw new Error(error.message);
            }

            if (!data || data.length === 0) {
                throw new Error('資料庫中沒有題目，請先加入資料。');
            }

            // 將資料轉換為前端易用格式
            return data.map(row => ({
                id: row.id,
                // 假設資料庫中有 image_url 欄位；若無則自動產生舊網址格式 (例如 DSE_Phy_Bk1_Ch04_MCxxx.png)
                image_url: row.image_url || `https://cdn.jsdelivr.net/gh/cychanclassroom/dsePhyBook@main/MC/book1/ch04/DSE_Phy_Bk1_Ch04_MC${String(row.id).padStart(3,'0')}.png`,
                option_a: row.option_a,
                option_b: row.option_b,
                option_c: row.option_c,
                option_d: row.option_d,
                correct_answer: row.correct_answer,
                explanation: row.explanation || '（此題沒有提供解釋）'
            }));
        } catch (err) {
            console.error(err);
            throw err;
        }
    }

    // 產生一題的 HTML 字串 (選項按鈕綁定 data-id，稍後用事件委派)
    function createQuestionHTML(q, index) {
        const qNumber = q.id;
        // 注意：選項按鈕會用自訂屬性 data-qid 和 data-choice
        return `
            <div class="question-item" data-page="-1" data-id="${qNumber}">
                <div class="q-number">Q${qNumber}</div>
                <img src="${q.image_url}" alt="題目圖片" onerror="this.src='https://placehold.co/600x200?text=Image+Missing'">
                <div class="ans-btns">
                    <button class="opt-btn" data-qid="${qNumber}" data-choice="A">A</button>
                    <button class="opt-btn" data-qid="${qNumber}" data-choice="B">B</button>
                    <button class="opt-btn" data-qid="${qNumber}" data-choice="C">C</button>
                    <button class="opt-btn" data-qid="${qNumber}" data-choice="D">D</button>
                </div>
                <div class="result" id="r${qNumber}"></div>
            </div>
        `;
    }

    // 根據題目數量產生分頁按鈕
    function generatePageButtons(totalItems) {
        totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
        const navDiv = document.getElementById('page-nav');
        navDiv.innerHTML = '';
        for (let i = 1; i <= totalPages; i++) {
            const start = (i-1)*ITEMS_PER_PAGE + 1;
            const end = Math.min(i*ITEMS_PER_PAGE, totalItems);
            const btn = document.createElement('button');
            btn.className = 'page-btn';
            if (i === 1) btn.classList.add('active');
            btn.textContent = `${start}–${end}`;
            btn.dataset.page = i;
            btn.addEventListener('click', () => showPage(i));
            navDiv.appendChild(btn);
        }
    }

    // 為所有題目分配 data-page 屬性 (根據排列順序)
    function assignPageToQuestions() {
        const items = document.querySelectorAll('.question-item');
        items.forEach((item, idx) => {
            const pageNum = Math.floor(idx / ITEMS_PER_PAGE) + 1;
            item.dataset.page = pageNum;
        });
    }

    // 顯示指定頁面
    function showPage(pageNum) {
        // 更新按鈕樣式
        document.querySelectorAll('.page-btn').forEach(btn => {
            const btnPage = parseInt(btn.dataset.page);
            if (btnPage === pageNum) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        // 顯示/隱藏題目
        document.querySelectorAll('.question-item').forEach(item => {
            const itemPage = parseInt(item.dataset.page);
            if (itemPage === pageNum) {
                item.classList.add('show');
            } else {
                item.classList.remove('show');
            }
        });
    }

    // 答題檢查 (事件委派)
    function setupAnswerChecker() {
        const container = document.getElementById('questions-container');
        container.addEventListener('click', (e) => {
            const btn = e.target.closest('.opt-btn');
            if (!btn) return;
            const qid = parseInt(btn.dataset.qid);
            const choice = btn.dataset.choice;
            // 從 allQuestions 中找到該題資料
            const question = allQuestions.find(q => q.id === qid);
            if (!question) return;
            const correctAns = question.correct_answer;
            const explanation = question.explanation;
            const resBox = document.getElementById(`r${qid}`);
            resBox.style.display = "block";
            if (choice === correctAns) {
                resBox.className = "result correct";
                resBox.innerHTML = `✅ 正確<br>答案：${correctAns}<br>解釋：${explanation}`;
            } else {
                resBox.className = "result wrong";
                resBox.innerHTML = `❌ 錯誤<br>正確答案：${correctAns}<br>解釋：${explanation}`;
            }
        });
    }

    // 主流程: 載入資料、渲染畫面
    async function init() {
        const container = document.getElementById('questions-container');
        try {
            // 檢查是否已填寫 Supabase 資料
            if (SUPABASE_URL.includes("YOUR_PROJECT") || SUPABASE_ANON_KEY.includes("YOUR_ANON_KEY")) {
                container.innerHTML = `<div class="error">⚠️ 請先在程式碼中填入正確的 SUPABASE_URL 和 SUPABASE_ANON_KEY</div>`;
                return;
            }

            container.innerHTML = '<div class="loading">載入題目中，請稍後...</div>';
            const questions = await loadQuestionsFromSupabase();
            allQuestions = questions;

            // 產生所有題目的 HTML
            let html = '';
            questions.forEach((q, idx) => {
                html += createQuestionHTML(q, idx);
            });
            container.innerHTML = html;

            // 根據順序分配頁數屬性 (每頁10題)
            assignPageToQuestions();

            // 產生分頁按鈕
            generatePageButtons(questions.length);

            // 顯示第一頁
            showPage(1);

            // 設定答案檢查 (事件委派)
            setupAnswerChecker();

        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="error">❌ 載入失敗：${err.message}<br><br>請確認：<br>1. Supabase URL 和 anon key 正確<br>2. 資料表名稱是 "phy_question"<br>3. 資料庫欄位包含 id, option_a~d, correct_answer, explanation, image_url (可選)</div>`;
        }
    }

    // 啟動
    init();
</script>
</body>
</html>
