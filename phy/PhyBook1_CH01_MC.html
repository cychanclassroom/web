<script>
const ansData = {
1:{ans:"B",expl:"攝氏溫標的高定點是 100 °C，而冰點和正在熔化的冰的溫度都是 0 °C。"},
2:{ans:"C",expl:"玻管液體溫度計中的液體隨溫度膨脹。"},
3:{ans:"A",expl:"華氏和開氏溫標是另外兩個溫度計常用的溫標。"},
4:{ans:"D",expl:"自來水的溫度等於室溫，溫度高於 0 °C。冷藏格的溫度低於0 °C，因此其中的冰塊的溫度也低於0 °C。正在熔化的冰的溫度為 0 °C。乾冰的溫度低於 −78.5 °C。"},
5:{ans:"D",expl:"溫度上升時，玻管液體溫度計中的液體會膨脹。由於溫度計X中液體的體積比Y大，所以溫度增幅相同時，X中液體體積的增幅比Y大。因此，不論在室溫還是汽點，X的液體柱都會比Y的長。"},
6:{ans:"B",expl:"根據實線，讀數120 C對應電阻值100 Ω。根據虛線，電阻值100 Ω對應的實際溫度高於120 °C。"},
7:{ans:"B",expl:"選項B中，該城市在12月至2月期間的每月平均溫度最高，而且在12個月內，每月平均溫度的變化小於15 C。"},
8:{ans:"B",expl:"物質的體積和電阻可能隨它的溫度改變。所有物質的質量不會隨它的溫度改變。"},
9:{ans:"D",expl:"物體的溫度愈高，它放出的紅外輻射的強度愈高。紅外輻射溫度計測量物體放出的紅外輻射強度，就可以量度得它的溫度。"},
10:{ans:"C",expl:"物料的物性P隨溫度T變化，且每個P值只對應單一溫度T時，溫度計可利用該物料的PT關係來量度溫度。物料X和Y的物性P都合乎上述的條件。"},
11:{ans:"C",expl:"當R是100 Ω，溫度是55 °C。"},
12:{ans:"A",expl:"減少玻璃管的直徑會使酒精柱在相同的溫度變化下，長度變化較大。這可以提高溫度計的靈敏度。玻璃管的長度不影響溫度計的靈敏度。如果液體在相同溫度升幅下膨脹較少，溫度計的靈敏度會較低。"},
13:{ans:"B",expl:"攝氏溫標的低定點是0 C。很多地方冬天時的溫度會低於0 C。高定點是在標準大氣壓強下，純水沸騰的溫度，即100 C。蒸汽的溫度可比100 C高。攝氏溫標的單位是攝氏度 (C)。"},
14:{ans:"D",expl:"25°C 到 100°C 上升 75°C，液柱上升 16cm；高出 8cm 即上升 37.5°C，T = 25 + 37.5 = 62.5°C"},
15:{ans:"D",expl:"玻管水銀溫度計比玻管酒精溫度計能量度更高的溫度。水銀是良好的導熱體，而酒精是不良的導熱體。以無毒的酒精代替有毒的水銀，可以使溫度計更加安全。"},
16:{ans:"A",expl:"攝氏溫標的低定點是在標準大氣壓強下，純冰熔化時的溫度，設定為0 °C。很多地方冬天時的溫度會低於0 C。"},
17:{ans:"B",expl:"最熱的時間約是13:30。當天的最高和最低溫度分別大約是29.1 °C和24.6 °C，因此整日的溫度變化小於5 °C。由08:00直至中午，溫度曾出現三次下降。"},
18:{ans:"A",expl:"溫度表示物體的冷熱程度。某些現象，如物質的熔化和沸騰，在特定的大氣壓強下，會在特定的溫度發生。攝氏度（或開 / 華氏度）是溫度的單位。"},
19:{ans:"B",expl:"物料的物性P隨溫度T變化，且每個P值只對應單一溫度T時，溫度計可利用該物料的PT關係來量度溫度。只有選項B合乎這些條件。"},
20:{ans:"D",expl:"10°C~110°C 共100°C對應20cm，每cm=5°C；10cm對應50°C，從0°C起算即為50°C？修正：10°C到110°C是20cm=100°C，1cm=5°C；水銀柱比0°C高10cm → T=10 + (10/20)×100 = 60°C"}
};

function check(qid, choice) {
  const resBox = document.getElementById(`r${qid}`);
  const correct = ansData[qid].ans;
  const expl = ansData[qid].expl;
  resBox.style.display = "block";
  if (choice === correct) {
    resBox.className = "result correct";
    resBox.innerHTML = `✅ 正確\n答案：${correct}\n解釋：${expl}`;
  } else {
    resBox.className = "result wrong";
    resBox.innerHTML = `❌ 錯誤\n正確答案：${correct}\n解釋：${expl}`;
  }
}

function showPage(page) {
  document.querySelectorAll('.page-btn').forEach((btn,i)=>{
    btn.classList.toggle('active', i+1===page);
  });
  document.querySelectorAll('.question-item').forEach(item=>{
    item.classList.toggle('show', +item.dataset.page === page);
  });
}
</script>
